<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      padding: 32px;
      color: #222;
    }

    h1 { margin-bottom: 8px; }
    p.subtitle { color: #666; margin-bottom: 32px; }

    .card {
      background: white;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 { margin-bottom: 16px; font-size: 1rem; color: #444; }

    pre {
      background: #f0f0f0;
      border-radius: 6px;
      padding: 16px;
      font-size: 0.85rem;
      overflow: auto;
      max-height: 400px;
    }

    .apps { display: flex; gap: 16px; flex-wrap: wrap; }

    .app-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      min-width: 220px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .app-card h3 { margin-bottom: 8px; }
    .app-card p { font-size: 0.85rem; color: #666; margin-bottom: 16px; }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      font-size: 0.8rem;
      min-height: 20px;
      color: #16a34a;
    }

    .status.error { color: #dc2626; }
  </style>
</head>
<body>

  <h1>Panel de Administración</h1>
  <p class="subtitle">Gestión de configuración y notificaciones</p>

  <!-- Config actual -->
  <div class="card">
    <h2>Config actual (app-config.json)</h2>
    <pre id="config-display">Cargando...</pre>
  </div>

  <!-- Apps conectadas -->
  <div class="card">
    <h2>Aplicaciones</h2>
    <div class="apps">

      <div class="app-card">
        <h3>Face App</h3>
        <p>Notifica a la app que debe actualizar su configuración.</p>
        <button id="btn-face-app" onclick="notifyApp('face-app')">
          Notificar actualización
        </button>
        <div class="status" id="status-face-app"></div>
      </div>

    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';

    // ── Cargar config al iniciar ──────────────────────────────────────────────
    async function loadConfig() {
      try {
        const res = await fetch(`${API}/person-detector/config`);
        const data = await res.json();
        document.getElementById('config-display').textContent =
          JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('config-display').textContent =
          'Error cargando config: ' + err.message;
      }
    }

    // ── Notificar a una app específica ────────────────────────────────────────
    async function notifyApp(appName) {
      const btn = document.getElementById(`btn-${appName}`);
      const status = document.getElementById(`status-${appName}`);

      btn.disabled = true;
      status.textContent = 'Enviando...';
      status.className = 'status';

      try {
        const res = await fetch(`${API}/person-detector/config/update`, { method: 'POST' });
        console.log(res);
        const data = await res.json();
        
        status.textContent = '✅ ' + data.message;
        status.className = 'status';
      } catch (err) {
        console.error('Caimos aca. Error notificando a la app:', err);
        status.textContent = '❌ Error: ' + err.message;
        status.className = 'status error';
      } finally {
        btn.disabled = false;
      }
    }

    loadConfig();
  </script>

</body>
</html>
